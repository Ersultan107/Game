

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 12px; max-width: 100%; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 0.5px solid var(--border); }
.tab { padding: 8px 14px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--text-accent); border-bottom-color: var(--border-accent); font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
.product-row { display: grid; grid-template-columns: 1fr 90px 60px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
.product-row:last-child { border-bottom: none; }
.product-name { font-size: 14px; color: var(--text-primary); }
.product-unit { font-size: 12px; color: var(--text-muted); }
input[type=number] { width: 100%; padding: 5px 8px; font-size: 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface-1); color: var(--text-primary); text-align: right; }
input[type=number]:focus { outline: none; border-color: var(--border-accent); }
.day-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.day-selector label { font-size: 14px; color: var(--text-secondary); }
.day-selector input[type=date] { padding: 6px 10px; font-size: 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface-1); color: var(--text-primary); }
.btn { padding: 8px 16px; border-radius: var(--radius); font-size: 14px; cursor: pointer; border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-primary); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--fill-accent); color: var(--on-accent); border-color: var(--fill-accent); }
.btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.остаток-row { display: grid; grid-template-columns: 1fr 85px 85px 70px; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.остаток-row:last-child { border-bottom: none; }
.остаток-row .label { font-size: 11px; color: var(--text-muted); text-align: center; }
.diff-ok { color: var(--text-success); font-size: 13px; text-align: center; }
.diff-warn { color: var(--text-danger); font-size: 13px; text-align: center; }
.header-row { display: grid; grid-template-columns: 1fr 85px 85px 70px; gap: 6px; padding: 4px 0 8px; }
.header-row span { font-size: 11px; color: var(--text-muted); text-align: center; }
.header-row span:first-child { text-align: left; }
.zakup-row { display: grid; grid-template-columns: 1fr 85px 85px 60px; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.zakup-row:last-child { border-bottom: none; }
.zakup-header { display: grid; grid-template-columns: 1fr 85px 85px 60px; gap: 6px; padding: 4px 0 8px; }
.zakup-header span { font-size: 11px; color: var(--text-muted); text-align: center; }
.zakup-header span:first-child { text-align: left; }
.cat-title { font-size: 12px; font-weight: 500; color: var(--text-accent); background: var(--bg-accent); padding: 4px 8px; border-radius: var(--radius); margin: 10px 0 6px; }
.act-block { font-family: var(--font-mono); font-size: 12px; white-space: pre; overflow-x: auto; background: var(--surface-1); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; color: var(--text-primary); }
.summary-badge { display: inline-block; padding: 2px 8px; border-radius: var(--radius); font-size: 12px; }
.badge-warn { background: var(--bg-warning); color: var(--text-warning); }
.badge-ok { background: var(--bg-success); color: var(--text-success); }
</style>

<div class="app">
<h2 class="sr-only">Учёт продуктов столовой ЗКАП Амиран-Агро</h2>

<div class="tabs">
  <button class="tab active" onclick="switchTab('rashod')"><i class="ti ti-calendar-stats" aria-hidden="true"></i> Расход</button>
  <button class="tab" onclick="switchTab('ostatki')"><i class="ti ti-scale" aria-hidden="true"></i> Остатки</button>
  <button class="tab" onclick="switchTab('zakupka')"><i class="ti ti-shopping-cart" aria-hidden="true"></i> Закупка</button>
  <button class="tab" onclick="switchTab('akt')"><i class="ti ti-file-text" aria-hidden="true"></i> Акт</button>
</div>

<div id="rashod" class="section active">
  <div class="day-selector">
    <label>Дата:</label>
    <input type="date" id="rashod-date" />
    <button class="btn" onclick="saveRashod()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Сохранить</button>
  </div>

  <div class="card">
    <div class="cat-title">Продукты</div>
    <div id="rashod-products"></div>
  </div>
  <div class="card">
    <div class="cat-title">Овощи</div>
    <div id="rashod-ovoshi"></div>
  </div>
  <div class="card">
    <div class="cat-title">Моющие</div>
    <div id="rashod-moyuschie"></div>
  </div>
  <div id="rashod-saved" style="margin-top:10px;font-size:13px;color:var(--text-success);display:none;"><i class="ti ti-check"></i> Расход сохранён!</div>
</div>

<div id="ostatki" class="section">
  <div class="card">
    <div class="card-title">Остатки по тетради vs фактические</div>
    <div class="header-row">
      <span>Наименование</span>
      <span>По тетради</span>
      <span>Факт (весы)</span>
      <span>Разница</span>
    </div>
    <div class="cat-title">Продукты</div>
    <div id="ostatki-products"></div>
    <div class="cat-title">Овощи</div>
    <div id="ostatki-ovoshi"></div>
    <div class="cat-title">Моющие</div>
    <div id="ostatki-moyuschie"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="saveOstatki()"><i class="ti ti-device-floppy"></i> Сохранить остатки</button>
  </div>
  <div id="ostatki-saved" style="margin-top:10px;font-size:13px;color:var(--text-success);display:none;"><i class="ti ti-check"></i> Остатки сохранены!</div>
</div>

<div id="zakupka" class="section">
  <div class="day-selector">
    <label>Дата закупки:</label>
    <input type="date" id="zakup-date" />
  </div>
  <div class="card">
    <div class="zakup-header">
      <span>Наименование</span>
      <span>Потребность</span>
      <span>Фак. приход</span>
      <span>Ед. изм.</span>
    </div>
    <div class="cat-title">Продукты</div>
    <div id="zakup-products"></div>
    <div class="cat-title">Овощи</div>
    <div id="zakup-ovoshi"></div>
    <div class="cat-title">Моющие</div>
    <div id="zakup-moyuschie"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="saveZakup()"><i class="ti ti-device-floppy"></i> Сохранить закупку</button>
  </div>
  <div id="zakup-saved" style="margin-top:10px;font-size:13px;color:var(--text-success);display:none;"><i class="ti ti-check"></i> Закупка сохранена!</div>
</div>

<div id="akt" class="section">
  <div class="btn-row" style="margin-bottom:14px;">
    <button class="btn btn-primary" onclick="generateAkt()"><i class="ti ti-file-text"></i> Сформировать акт</button>
    <button class="btn" onclick="copyAkt()"><i class="ti ti-copy"></i> Копировать</button>
  </div>
  <div id="akt-content"></div>
</div>
</div>

<script>
const PRODUCTS = [
  {name:'Рис "Камолино"', unit:'кг'},
  {name:'Горох', unit:'кг'},
  {name:'Чечевица', unit:'кг'},
  {name:'Манная крупа', unit:'пачек'},
  {name:'Гречневая крупа', unit:'кг'},
  {name:'Перловая крупа', unit:'кг'},
  {name:'Пшено', unit:'пачек'},
  {name:'Макароны (Крупные, рожки)', unit:'кг'},
  {name:'Спагетти', unit:'кг'},
  {name:'Манпар (жайма)', unit:'пачек'},
  {name:'Кеспе тонкая', unit:'пачек'},
  {name:'Мясо (говядина)', unit:'кг'},
  {name:'Суп набор с костями (говядина)', unit:'кг'},
  {name:'Окорочка', unit:'кг'},
  {name:'Яйца', unit:'шт'},
  {name:'Сосиска в упаковке', unit:'шт'},
  {name:'Масло растительное 5л', unit:'л'},
  {name:'Масло сливочное/спред', unit:'пачек'},
  {name:'Соленые огурцы', unit:'банка'},
  {name:'Томатная паста', unit:'банка'},
  {name:'Майонез', unit:'шт'},
  {name:'Кетчуп', unit:'шт'},
  {name:'Мука', unit:'кг'},
  {name:'Чай 500гр', unit:'пачек'},
  {name:'Чай 250гр', unit:'пачек'},
  {name:'Сахар', unit:'кг'},
  {name:'Соль', unit:'кг'},
  {name:'Перец красный молотый', unit:'пачек'},
  {name:'Перец черный молотый', unit:'пачек'},
  {name:'Уксус', unit:'бут'},
  {name:'Дрожжи', unit:'пачек'},
  {name:'Пищевая сода', unit:'пачек'},
  {name:'Лавровый лист', unit:'пачек'},
];
const OVOSHI = [
  {name:'Картофель', unit:'кг'},
  {name:'Капуста белокочанная', unit:'кг'},
  {name:'Морковь', unit:'кг'},
  {name:'Редька зеленая', unit:'кг'},
  {name:'Свекла', unit:'кг'},
  {name:'Укроп', unit:'кг'},
  {name:'Чеснок', unit:'кг'},
  {name:'Перец болгарский', unit:'кг'},
  {name:'Лук репчатый', unit:'кг'},
];
const MOYUSCHIE = [
  {name:'Фейри 900мл', unit:'шт'},
  {name:'Мыло хозяйственное', unit:'шт'},
  {name:'Салфетки бумажные', unit:'упак'},
  {name:'Белизна', unit:'шт'},
  {name:'Тряпка', unit:'шт'},
  {name:'Туалетная бумага', unit:'упак'},
  {name:'Пакет 60кг 29шт', unit:'упак'},
  {name:'Пакет майка-бомба', unit:'шт'},
  {name:'Губка', unit:'упак'},
  {name:'Стиральный порошок 2кг', unit:'кг'},
  {name:'Металлическая мочалка', unit:'шт'},
  {name:'Спички', unit:'упак'},
  {name:'Дихлофос', unit:'шт'},
  {name:'Комет (большой)', unit:'шт'},
  {name:'Одноразовый стакан', unit:'шт'},
];

let state = {rashod:{}, ostatki:{fact:{}}, zakupka:{}};
try { let s = localStorage.getItem('farm_state'); if(s) state = JSON.parse(s); } catch(e){}
function save() { try { localStorage.setItem('farm_state', JSON.stringify(state)); } catch(e){} }

function today() { return new Date().toISOString().slice(0,10); }

function initDates() {
  document.getElementById('rashod-date').value = today();
  document.getElementById('zakup-date').value = today();
}

function makeRashodRow(item, cat) {
  const key = cat+'|'+item.name;
  const date = document.getElementById('rashod-date')?.value || today();
  const val = (state.rashod[date] && state.rashod[date][key]) || '';
  return `<div class="product-row">
    <div><div class="product-name">${item.name}</div><div class="product-unit">${item.unit}</div></div>
    <input type="number" min="0" step="0.001" placeholder="0" value="${val}" id="r_${cat}_${item.name.replace(/[^а-яa-z0-9]/gi,'_')}" oninput="storeRashod('${date}','${key}',this.value)" />
    <div class="product-unit" style="text-align:right">${item.unit}</div>
  </div>`;
}

function storeRashod(date, key, val) {
  if(!state.rashod[date]) state.rashod[date] = {};
  state.rashod[date][key] = val;
}

function renderRashod() {
  document.getElementById('rashod-products').innerHTML = PRODUCTS.map(p=>makeRashodRow(p,'p')).join('');
  document.getElementById('rashod-ovoshi').innerHTML = OVOSHI.map(p=>makeRashodRow(p,'o')).join('');
  document.getElementById('rashod-moyuschie').innerHTML = MOYUSCHIE.map(p=>makeRashodRow(p,'m')).join('');
}

function saveRashod() {
  save();
  const el = document.getElementById('rashod-saved');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}

function calcOstatokPoTetrad(cat, item) {
  const key = cat+'|'+item.name;
  let total = 0;
  Object.keys(state.rashod||{}).forEach(date => {
    const v = parseFloat((state.rashod[date]||{})[key]);
    if(!isNaN(v)) total += v;
  });
  const zKey = cat+'|'+item.name;
  const prihod = parseFloat((state.zakupka||{})[zKey+'_prihod']) || 0;
  return prihod - total;
}

function makeOstatokRow(item, cat) {
  const key = cat+'|'+item.name;
  const po_tetr = calcOstatokPoTetrad(cat, item);
  const fact = parseFloat((state.ostatki.fact||{})[key]) || '';
  const diff = fact !== '' ? (fact - po_tetr) : null;
  const diffStr = diff === null ? '—' : (diff >= 0 ? `<span class="diff-ok">+${diff.toFixed(2)}</span>` : `<span class="diff-warn">${diff.toFixed(2)}</span>`);
  return `<div class="остаток-row">
    <div><div class="product-name" style="font-size:13px">${item.name}</div><div class="product-unit">${item.unit}</div></div>
    <div style="text-align:center;font-size:13px">${isNaN(po_tetr)?'0':po_tetr.toFixed(2)}</div>
    <input type="number" min="0" step="0.001" placeholder="0" value="${fact}" style="width:100%;font-size:13px" onchange="state.ostatki.fact['${key}']=this.value;renderOstatki()" />
    <div>${diffStr}</div>
  </div>`;
}

function renderOstatki() {
  document.getElementById('ostatki-products').innerHTML = PRODUCTS.map(p=>makeOstatokRow(p,'p')).join('');
  document.getElementById('ostatki-ovoshi').innerHTML = OVOSHI.map(p=>makeOstatokRow(p,'o')).join('');
  document.getElementById('ostatki-moyuschie').innerHTML = MOYUSCHIE.map(p=>makeOstatokRow(p,'m')).join('');
}

function saveOstatki() {
  save();
  const el = document.getElementById('ostatki-saved');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}

function makeZakupRow(item, cat) {
  const key = cat+'|'+item.name;
  const potr = (state.zakupka||{})[key+'_potr'] || '';
  const prih = (state.zakupka||{})[key+'_prihod'] || '';
  return `<div class="zakup-row">
    <div><div class="product-name" style="font-size:13px">${item.name}</div></div>
    <input type="number" min="0" step="0.001" placeholder="0" value="${potr}" style="font-size:13px" onchange="if(!state.zakupka)state.zakupka={};state.zakupka['${key}_potr']=this.value" />
    <input type="number" min="0" step="0.001" placeholder="0" value="${prih}" style="font-size:13px" onchange="if(!state.zakupka)state.zakupka={};state.zakupka['${key}_prihod']=this.value" />
    <div class="product-unit" style="text-align:center">${item.unit}</div>
  </div>`;
}

function renderZakup() {
  document.getElementById('zakup-products').innerHTML = PRODUCTS.map(p=>makeZakupRow(p,'p')).join('');
  document.getElementById('zakup-ovoshi').innerHTML = OVOSHI.map(p=>makeZakupRow(p,'o')).join('');
  document.getElementById('zakup-moyuschie').innerHTML = MOYUSCHIE.map(p=>makeZakupRow(p,'m')).join('');
}

function saveZakup() {
  save();
  const el = document.getElementById('zakup-saved');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}

function generateAkt() {
  const date = today();
  let lines = [];
  lines.push('АКТ ИНВЕНТАРИЗАЦИИ');
  lines.push('Столовая ЗКАП Амиран-Агро');
  lines.push('Дата: ' + date);
  lines.push('');
  lines.push('═══════════════════════════════════════════════');
  lines.push('РАСХОД ПО ДНЯМ:');
  lines.push('');
  const dates = Object.keys(state.rashod||{}).sort();
  if(dates.length === 0) { lines.push('(нет данных)'); }
  dates.forEach(d => {
    lines.push('  ' + d + ':');
    const ALL = [{list:PRODUCTS,cat:'p'},{list:OVOSHI,cat:'o'},{list:MOYUSCHIE,cat:'m'}];
    ALL.forEach(({list,cat}) => {
      list.forEach(item => {
        const key = cat+'|'+item.name;
        const v = (state.rashod[d]||{})[key];
        if(v && parseFloat(v) > 0) lines.push(`    ${item.name}: ${v} ${item.unit}`);
      });
    });
  });
  lines.push('');
  lines.push('═══════════════════════════════════════════════');
  lines.push('ОСТАТКИ:');
  lines.push('');
  lines.push(pad('Наименование',28) + pad('По тетр.',10) + pad('Факт',10) + 'Разница');
  lines.push('─'.repeat(55));
  const ALLCAT = [{list:PRODUCTS,cat:'p',label:'ПРОДУКТЫ'},{list:OVOSHI,cat:'o',label:'ОВОЩИ'},{list:MOYUSCHIE,cat:'m',label:'МОЮЩИЕ'}];
  ALLCAT.forEach(({list,cat,label}) => {
    lines.push(label + ':');
    list.forEach(item => {
      const key = cat+'|'+item.name;
      const po = calcOstatokPoTetrad(cat, item);
      const fact = parseFloat((state.ostatki.fact||{})[key]);
      const diff = !isNaN(fact) ? (fact - po) : null;
      const diffStr = diff === null ? '—' : (diff>=0?'+':'')+diff.toFixed(2);
      lines.push(pad(item.name,28) + pad(isNaN(po)?'0':po.toFixed(2),10) + pad(!isNaN(fact)?fact.toFixed(2):'—',10) + diffStr);
    });
  });
  lines.push('');
  lines.push('═══════════════════════════════════════════════');
  lines.push('ЗАКУПКА:');
  lines.push('');
  lines.push(pad('Наименование',28) + pad('Потреб.',10) + pad('Приход',10) + 'Ед.');
  lines.push('─'.repeat(55));
  ALLCAT.forEach(({list,cat,label}) => {
    lines.push(label + ':');
    list.forEach(item => {
      const key = cat+'|'+item.name;
      const potr = (state.zakupka||{})[key+'_potr'] || '—';
      const prih = (state.zakupka||{})[key+'_prihod'] || '—';
      if(potr !== '—' || prih !== '—') lines.push(pad(item.name,28) + pad(potr,10) + pad(prih,10) + item.unit);
    });
  });
  document.getElementById('akt-content').innerHTML = `<div class="act-block">${lines.join('\n')}</div>`;
}

function pad(str, len) { str = String(str); return str.length >= len ? str.slice(0,len-1)+' ' : str + ' '.repeat(len-str.length); }

function copyAkt() {
  const el = document.getElementById('akt-content');
  if(!el.textContent) { generateAkt(); }
  navigator.clipboard.writeText(el.textContent).catch(()=>{});
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  event.target.closest('.tab').classList.add('active');
  if(name==='ostatki') renderOstatki();
  if(name==='zakupka') renderZakup();
  if(name==='rashod') renderRashod();
}

initDates();
renderRashod();
</script>
